<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CCP Cursos - Portal do Aluno</title>
    <style>
        :root { --primary: #004a99; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 20px; } .active { display: block; }
        .video-container { width: 320px; height: 180px; cursor: pointer; transition: 0.3s; background: #000; }
        .video-container.expandido { width: 100%; height: 400px; }
        .sidebar { width: 200px; background: #333; color: white; height: 100vh; position: fixed; display: none; padding: 20px; }
    </style>
</head>
<body>

<nav>
    <img src="URL_DA_LOGO" style="width:100px;">
    <div>
        <button onclick="showPage('vitrine')">Cursos</button>
        <button onclick="showPage('acesso')">Área do Aluno</button>
    </div>
</nav>

<div id="sidebar" class="sidebar">
    <button onclick="showPage('trilha')">Trilha</button><br>
    <button onclick="showPage('meus-dados')">Meus Dados</button>
</div>

<main style="margin-left: 220px;">
    <div id="acesso" class="page active">
        <h2>Já sou aluno</h2>
        <input id="login-chave" placeholder="Chave"><input id="login-cpf" placeholder="CPF">
        <button onclick="enviarAcao('login')">Entrar</button>
        
        <h2>Primeiro Acesso</h2>
        <input id="cad-nome" placeholder="Nome"><input id="cad-chave" placeholder="Chave"><input id="cad-cpf" placeholder="CPF">
        <button onclick="enviarAcao('cadastro')">Cadastrar</button>
    </div>

    <div id="trilha" class="page">
        <h1>Almoxarifado</h1>
        <div class="video-container" onclick="this.classList.add('expandido')"></div>
        <p>Exercício 01: <span id="status-ex1">⚪</span> <button onclick="window.open('LINK_FORMS')">Responder</button></p>
        <button onclick="alert('Verificando status de pagamento...')">SOLICITAR CERTIFICADO</button>
    </div>
</main>

<script>
    const URL_SCRIPT = "COLE_AQUI_A_URL_DO_SEU_WEB_APP";

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'trilha') document.getElementById('sidebar').style.display = 'block';
    }

    function enviarAcao(acao) {
        let params = {acao: acao};
        if(acao === 'login') { params.chave = document.getElementById('login-chave').value; params.cpf = document.getElementById('login-cpf').value; }
        
        fetch(URL_SCRIPT, { method: 'POST', body: new URLSearchParams(params) })
        .then(res => res.text())
        .then(data => {
            if(data.includes("SUCESSO")) showPage('trilha');
            else alert("Erro: " + data);
        });
    }
</script>
</body>
</html>
