<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CECP Cursos - Portal do Aluno</title>
    <style>
        :root { --cor-principal: #004a99; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f9; }
        
        /* Layout */
        nav { background: var(--cor-principal); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .sidebar { width: 220px; height: 100vh; position: fixed; left: -220px; top: 60px; background: #333; color: white; padding: 20px; transition: 0.3s; }
        .sidebar.active { left: 0; }
        .main-content { padding: 40px; margin-left: 0; transition: 0.3s; }
        
        /* Componentes */
        .page { display: none; }
        .page.active { display: block; }
        .btn { padding: 10px 20px; cursor: pointer; background: var(--cor-principal); color: white; border: none; border-radius: 5px; }
        
        /* Trilha */
        .aula-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .video-box { width: 100%; max-width: 560px; height: 315px; background: black; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <button onclick="toggleSidebar()">☰ Menu</button>
    <div>
        <button onclick="showPage('vitrine')">Cursos</button>
        <button onclick="showPage('acesso')">Área do Aluno</button>
    </div>
</nav>

<!-- Sidebar Lateral (Área do Aluno) -->
<div id="sidebar" class="sidebar">
    <button onclick="showPage('meus-dados')">Meus Dados</button>
    <button onclick="showPage('trilha')">Trilha de Conhecimento</button>
    <button onclick="showPage('certificados')">Certificados</button>
</div>

<main id="content" class="main-content">
    <!-- Exemplo da Trilha (Conteúdo após login) -->
    <div id="trilha" class="page">
        <h1>Gestão de Almoxarifado</h1>
        <div class="aula-card">
            <h3>Aula 01 - Introdução</h3>
            <div class="video-box">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/Mu-3vb_mYvE" frameborder="0" allowfullscreen></iframe>
            </div>
            <p>Material: <a href="LINK_DRIVE" target="_blank">Baixar PDF</a></p>
            <ul>
                <li>Exercício 01: Nota 8 ✅ <button>Acessar</button></li>
                <li>Exercício 02: Nota 4 ❎ <button>Acessar</button></li>
            </ul>
        </div>
        <button class="btn" onclick="solicitarCertificado()">SOLICITAR CERTIFICADO</button>
    </div>
</main>

<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function solicitarCertificado() {
        // Lógica de validação que checa nota >= 6 e pagamento via App Script
        alert("Validando requisitos para emissão...");
    }
</script>
</body>
</html>
