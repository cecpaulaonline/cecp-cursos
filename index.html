<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CCP Cursos - Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        #app-container { max-width: 800px; margin: auto; padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <nav>
        <button onclick="loadContent('vitrine')">Vitrine</button>
        <button onclick="loadContent('login')">Área do Aluno</button>
    </nav>

    <div id="content-display">
        <h1>Bem-vindo à CCP Cursos</h1>
    </div>
</div>

<script>
    function loadContent(page) {
        const display = document.getElementById('content-display');
        
        // Se for página de login/acesso
        if (page === 'login') {
            display.innerHTML = `
                <h2>Área do Aluno</h2>
                <input id="chave" placeholder="Chave de Acesso">
                <input id="cpf" placeholder="CPF">
                <button onclick="fazerLogin()">Entrar</button>
            `;
        } 
        // Se for a vitrine (pode ser um link externo ou um arquivo HTML)
        else if (page === 'vitrine') {
            display.innerHTML = '<h1>Vitrine de Cursos</h1><p>Lista de cursos aqui...</p>';
        }
    }

    function fazerLogin() {
        const chave = document.getElementById('chave').value;
        const cpf = document.getElementById('cpf').value;
        
        // Conexão com seu Script (O único ponto de falha que precisamos garantir)
        fetch("SUA_URL_DO_APP_SCRIPT", {
            method: 'POST',
            body: new URLSearchParams({acao: 'login', chave: chave, cpf: cpf})
        })
        .then(res => res.text())
        .then(data => {
            if(data.includes("SUCESSO")) {
                // Se logou, carregamos o arquivo da "Trilha"
                window.location.href = "trilha.html"; 
            } else {
                alert("Acesso negado.");
            }
        });
    }
</script>
</body>
</html>
